<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yurotlas</title>

  <style>
    :root {
      --bg:#020617;
      --bg2:#0f172a;
      --card:#0b1220;
      --border:#223047;
      --text:#e5eefc;
      --muted:#93a4bf;
      --accent:#38bdf8;
    }

    body {
      margin:0;
      font-family:Inter,system-ui;
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
    }

    .app {
      max-width:900px;
      margin:40px auto;
      padding:20px;
    }

    .panel {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      padding:20px;
    }

    /* 🔥 NEUER HEADER */
    .header {
      display:flex;
      align-items:center;
      gap:15px;
      margin-bottom:15px;
    }

    .logo {
      width:70px;
      height:70px;
    }

    .subtitle {
      color:var(--muted);
      margin:0;
      font-size:0.95rem;
    }

    .badges {
      display:flex;
      gap:10px;
      margin:15px 0;
      flex-wrap:wrap;
    }

    .badge {
      border:1px solid var(--border);
      padding:8px 12px;
      border-radius:999px;
      font-size:0.85rem;
      color:var(--muted);
    }

    input, select {
      width:100%;
      margin-top:10px;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--bg2);
      color:white;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .buttons {
      display:flex;
      gap:10px;
      margin-top:15px;
    }

    button {
      flex:1;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:transparent;
      color:white;
      cursor:pointer;
    }

    button:hover {
      border-color:var(--accent);
    }
  </style>
</head>

<body>

<div class="app">
  <div class="panel">

    <!-- 🔥 LOGO STATT TITEL -->
    <div class="header">
      <img src="./yurotlas-logo-v2.svg" class="logo" />
      <div>
        <p class="subtitle">
          Deine Reise- und Spot-Übersicht. Optimiert für Mobile.
        </p>
      </div>
    </div>

    <div class="badges">
      <div class="badge">⚡ Schneller Start</div>
      <div class="badge">📱 Mobile optimiert</div>
      <div class="badge">🗺️ Interaktive Karte</div>
    </div>

    <input placeholder="Suchen nach Ort, Stadt, Kategorie..." />

    <div class="grid">
      <select><option>Land</option></select>
      <select><option>Stadt</option></select>
      <select><option>Kategorie</option></select>
      <select><option>Alle Pins</option></select>
    </div>

    <div class="buttons">
      <button>Filter zurücksetzen</button>
      <button>Zur Karte</button>
    </div>

  </div>
</div>

</body>
</html>
